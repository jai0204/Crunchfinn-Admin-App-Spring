<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout">
<div th:fragment="content">
  <div class="w-full max-w-7xl mx-auto bg-white">
    <div class="px-6 py-4 border-b-1 border-gray-200">
      <form class="flex flex-wrap gap-y-4 gap-x-6" th:action="@{/disbursements}" method="get">
        <div class="flex grow">
          <input id="name" type="text" name="search" th:value="${search}" placeholder="Search by applicationId or name" aria-label="Name"
                 class="grow py-1.5 px-3 text-sm text-gray-900 rounded-sm outline outline-gray-300 outline-offset-1">
        </div>
        <div class="flex">
          <input id="date" type="month" title="Disbursement Date" name="disbursementMonth" th:value="${disbursementMonth}" placeholder="Disbursement Date"
                 class="grow py-1.5 px-3 text-sm text-gray-900 rounded-sm outline outline-gray-300 outline-offset-1">
        </div>
        <div class="grid grid-cols-1">
          <select id="source" name="source"
                  class="row-start-1 col-start-1 pl-3 pr-8 py-1.5 text-sm text-gray-900 rounded-sm appearance-none outline outline-gray-300 outline-offset-1">
            <option value="" disabled selected>Choose Source...</option>
            <option th:each="sourceValue : ${sourceList}"
                    th:value="${sourceValue}"
                    th:text="${sourceValue}"
                    th:selected="${sourceValue.name() == source}">
            </option>
          </select>
          <svg viewBox="0 0 16 16" fill="currentColor" data-slot="icon" aria-hidden="true" class="mr-2 row-start-1 col-start-1 size-5 sm:size-4 text-gray-500 justify-self-end self-center pointer-events-none">
            <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd"></path>
          </svg>
        </div>
        <div>
          <button type="submit" class="py-2 px-3 inline-flex items-center gap-x-1.5 text-sm font-semibold text-white rounded-md shadow-xs bg-blue-600 hover:bg-blue-500">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            Search
          </button>
        </div>
      </form>
    </div>
    <div class="py-4 px-6">
      <div th:if="${disbursements != null and #lists.isEmpty(disbursements)}"
           class="p-4 sm:p-6 lg:p-10 border-2 border-dashed border-gray-200 rounded-lg">
        <h2 class="text-base font-semibold text-gray-900">No disbursements found</h2>
        <p class="mt-1 text-sm/6 text-gray-500">Wait for applications to be disbursed.</p>
      </div>
      <div th:if="${disbursements != null and !#lists.isEmpty(disbursements)}"
           class="w-full border border-gray-200 rounded-lg overflow-x-auto">
        <table class="relative min-w-full divide-y-1 divide-gray-300">
          <thead>
          <tr>
            <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-blue-600">#</th>
            <th scope="col" class="py-3.5 px-3 text-left text-sm font-semibold text-blue-600">App_Id</th>
            <th scope="col" class="py-3.5 px-3 text-left text-sm font-semibold text-blue-600">Name</th>
            <th scope="col" class="py-3.5 px-3 text-left text-sm font-semibold text-blue-600">Loan Amount</th>
            <th scope="col" class="py-3.5 px-3 text-left text-sm font-semibold text-blue-600">Country</th>
            <th scope="col" class="py-3.5 px-3 text-left text-sm font-semibold text-blue-600">Source</th>
            <th scope="col" class="py-3.5 px-3 text-left text-sm font-semibold text-blue-600">Bank Partner</th>
            <th scope="col" class="py-3.5 px-3 text-left text-sm font-semibold text-blue-600">Tranches</th>
            <th scope="col" class="pl-3 py-3.5 pr-4">
              <span class="sr-only">Update</span>
            </th>
          </tr>
          </thead>
          <tbody class="divide-y-1 divide-gray-200">
          <tr th:each="dis : ${disbursements}">
            <td class="pl-4 pr-3 py-4 text-sm text-gray-600 whitespace-nowrap" th:text="${disStat.count}"></td>
            <td class="py-4 px-3 text-sm text-gray-600 whitespace-nowrap" th:text="${dis.applicationNumber}"></td>
            <td class="py-4 px-3 text-sm text-gray-600 whitespace-nowrap" th:text="${dis.name}"></td>
            <td class="py-4 px-3 text-sm text-gray-600 whitespace-nowrap" th:text="${#numbers.formatInteger(dis.loanAmount, 1, 'COMMA')}"></td>
            <td class="py-4 px-3 text-sm text-gray-600 whitespace-nowrap" th:text="${dis.targetCountry}"></td>
            <td class="py-4 px-3 text-sm text-gray-600 whitespace-nowrap" th:text="${dis.source}"></td>
            <td class="py-4 px-3 text-sm text-gray-600 whitespace-nowrap"><span th:text="${dis.bankName}"></span> - <span th:text="${dis.city}"></span></td>
            <td class="py-4 px-3 text-sm text-gray-600 whitespace-nowrap" th:text="${dis.trancheCount}"></td>
            <td class="pl-3 pr-4 py-4 text-right text-sm font-medium whitespace-nowrap">
              <button type="button" th:onclick="|openModal(${dis.disbursementId})|" class="py-1.5 px-2.5 text-sm font-semibold text-white rounded-md shadow-xs bg-blue-600 hover:bg-blue-500">
                Update
              </button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div id="disbursementModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
      <div class="bg-white rounded-lg shadow-lg w-full max-w-lg">
        <div class="p-4 border-b border-gray-200">
          <h2 class="text-md font-semibold text-gray-900">
            Disbursement Details
          </h2>
        </div>
        <div class="py-4 max-h-120 overflow-y-auto">
          <form id="trancheForm" method="post" th:action="@{/disbursements/update}">
            <input type="hidden" name="disbursementId" id="disbursementId"/>
            <!-- Tranches Container -->
            <div id="trancheContainer" class="px-4 divide-y divide-gray-200 border-b border-gray-200"></div>
            <!-- Add Button -->
            <div class="px-4 py-4">
              <button type="button" onclick="addEmptyTranche()"
                      class="inline-flex items-center gap-x-1.5 px-2.5 py-1.5 text-sm text-white font-semibold rounded-md bg-blue-600 shadow-xs hover:bg-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 text-white">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Add
              </button>
            </div>
            <!-- Actions -->
            <!-- Buttons -->
            <div class="px-4 mt-6 flex justify-end gap-3">
              <button type="button"
                      onclick="closeModal()"
                      class="px-3 py-1.5 text-sm font-semibold rounded-md border border-gray-300 text-gray-700 hover:bg-gray-100">
                Cancel
              </button>
              <!-- FORM SUBMIT -->
              <button type="submit" class="px-3 py-1.5 text-sm font-semibold rounded-md bg-blue-600 text-white hover:bg-blue-700">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
    let index = 0;
    function addEmptyTranche() {
      const container = document.getElementById('trancheContainer');

      const row = document.createElement('div');
      row.className = "py-2";
        row.innerHTML = `
            <h3 class="mb-2 text-base font-medium text-gray-900">Tranche - ${index+1}</h3>
            <input type="hidden" name="tranches[${index}].id" />
            <div class="grid grid-cols-2 gap-4 mb-2">
              <div class="col-span-1">
                <label for="amount-${index}" class="block text-sm/6 font-medium text-gray-900">Amount *</label>
                <input id="amount-${index}" type="number" step="0.01" required
                  name="tranches[${index}].amount"
                  class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6" />
              </div>
              <div class="col-span-1">
                <label for="date-${index}" class="block text-sm/6 font-medium text-gray-900">Date *</label>
                <input id="date-${index}" type="date" required
                  name="tranches[${index}].disbursementDate"
                  class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6" />
              </div>
              <div class="col-span-2 flex justify-end">
                <button type="button" onclick="removeRow(this)"
                  class="px-1 py-1 text-sm rounded-md bg-red-500 text-white hover:bg-red-600">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 stroke-white">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                  </svg>
                </button>
              </div>
            </div>
        `;

        container.appendChild(row);
        index++;
    }
    function addTranche(amount, date, id) {
        const container = document.getElementById('trancheContainer');

        const row = document.createElement('div');
        row.className = "tranche-block py-2";
        row.innerHTML = `
            <h3 class="mb-2 text-base font-medium text-gray-900">Tranche - ${index+1}</h3>
            <input type="hidden" name="tranches[${index}].id" value="${id}" />
            <div class="grid grid-cols-2 gap-4 mb-2">
              <div class="col-span-1">
                <label for="amount-${index}" class="block text-sm/6 font-medium text-gray-900">Amount *</label>
                <input id="amount-${index}" type="number" step="0.01" required
                  name="tranches[${index}].amount"
                  value="${amount}"
                  class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6" />
              </div>
              <div class="col-span-1">
                <label for="date-${index}" class="block text-sm/6 font-medium text-gray-900">Date *</label>
                <input id="date-${index}" type="date" required
                  name="tranches[${index}].disbursementDate"
                  value="${date}"
                  class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6" />
              </div>
              <div class="col-span-2 flex justify-end">
                <button type="button" onclick="removeRow(this)"
                  class="px-1 py-1 text-sm rounded-md bg-red-500 text-white hover:bg-red-600">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 stroke-white">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                  </svg>
                </button>
              </div>
            </div>
        `;

        container.appendChild(row);
        index++;
    }

    function removeRow(btn) {
        btn.closest('.tranche-block').remove();
    }
  </script>
  <script>
    function openModal(id) {
      fetch(`/disbursements/${id}`)
      .then(res => res.json())
      .then(data => {
          document.getElementById('disbursementId').value = data.id;

          const container = document.getElementById('trancheContainer');
          container.innerHTML = '';
          index = 0;

          if (data.tranches.length === 0) {
            addEmptyTranche(); // empty row
          } else {
            data.tranches.forEach(t => {
              addTranche(t.amount, t.disbursementDate, t.id);
            });
          }

          document.getElementById('disbursementModal').classList.remove('hidden');
          document.getElementById('disbursementModal').classList.add('flex');
      });
    }
    function closeModal() {
        document.getElementById('disbursementModal').classList.add('hidden');
        document.getElementById('disbursementModal').classList.remove('flex');
    }
  </script>
</div>
</html>
