  <script>
    (function () {

      class ElDropdown {
        constructor(root) {
          this.root = root;
          this.button = root.querySelector("[data-dropdown-trigger]");
          this.menu = root.querySelector("[data-dropdown-menu]");

          this.isOpen = false;

          this.init();
        }

        init() {
          if (!this.button || !this.menu) return;

          this.button.addEventListener("click", (e) => {
            e.stopPropagation();
            this.toggle();
          });

          // Close on outside click
          document.addEventListener("click", (e) => {
            if (!this.root.contains(e.target)) {
              this.close();
            }
          });

          // ESC key support
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
              this.close();
            }
          });
        }

        open() {
          this.closeAll();

          this.menu.classList.remove("hidden");
          requestAnimationFrame(() => {
            this.menu.classList.remove("opacity-0", "scale-95");
            this.menu.classList.add("opacity-100", "scale-100");
          });

          this.isOpen = true;
        }

        close() {
          if (!this.isOpen) return;

          this.menu.classList.add("opacity-0", "scale-95");

          setTimeout(() => {
            this.menu.classList.add("hidden");
          }, 100);

          this.isOpen = false;
        }

        toggle() {
          this.isOpen ? this.close() : this.open();
        }

        closeAll() {
          document.querySelectorAll("el-dropdown").forEach(dropdown => {
            if (dropdown !== this.root && dropdown.__instance) {
              dropdown.__instance.close();
            }
          });
        }
      }

      // Initialize all dropdowns
      document.querySelectorAll("el-dropdown").forEach(el => {
        el.__instance = new ElDropdown(el);
      });

    })();
  </script>

  </script>
