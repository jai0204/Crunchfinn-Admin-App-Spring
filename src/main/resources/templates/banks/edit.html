<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout">
<div th:fragment="content">
  <div class="w-full max-w-7xl mx-auto bg-white">
    <div class="py-4 lg:py-8 px-6 lg:px-12">
      <div class="mb-4 text-sm"><span class="font-semibold text-blue-600">Bank_Code: </span><span class="text-gray-600" th:text="${form.bankCode}"></span> </div>
      <form th:action="@{/banks/{id}/edit(id=${form.bankCode})}" th:object="${form}" method="post">
        <div class="space-y-6">
          <!-- Bank info -->
          <div class="border-b border-gray-900/10 pb-6">
            <h2 class="text-base/7 font-semibold text-gray-900">1. Bank Information</h2>
            <div class="mt-6 grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-6">
              <div class="sm:col-span-3">
                <label for="name" class="block text-sm/6 font-medium text-gray-900">Bank Name *</label>
                <div class="mt-2">
                  <input id="name" type="text" th:field="*{name}" required
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
              <div class="sm:col-span-3">
                <label for="official-name" class="block text-sm/6 font-medium text-gray-900">Official Name</label>
                <div class="mt-2">
                  <input id="official-name" type="text" th:field="*{officialName}"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
              <div class="sm:col-span-3">
                <label for="partnership-date" class="block text-sm/6 font-medium text-gray-900">Partnership Date</label>
                <div class="mt-2">
                  <input id="partnership-date" type="date" name="partnershipDate" th:value="${#temporals.format(form.partnershipDate, 'yyyy-MM-dd')}"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
            </div>
          </div>
          <!-- Contract info -->
          <div class="border-b border-gray-900/10 pb-6">
            <h2 class="text-base/7 font-semibold text-gray-900">2. Contract Information</h2>
            <div class="mt-6 grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-6">
              <div class="sm:col-span-3">
                <label for="partner-code" class="block text-sm/6 font-medium text-gray-900">Partner Code</label>
                <div class="mt-2">
                  <input id="partner-code" type="text" th:field="*{partnerCode}"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
              <div class="sm:col-span-3">
                <label for="start-date" class="block text-sm/6 font-medium text-gray-900">Start Date</label>
                <div class="mt-2">
                  <input id="start-date" type="date" name="contractStartDate" th:value="${#temporals.format(form.contractStartDate, 'yyyy-MM-dd')}"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
              <div class="sm:col-span-3">
                <label for="end-date" class="block text-sm/6 font-medium text-gray-900">End Date</label>
                <div class="mt-2">
                  <input id="end-date" type="date" name="contractEndDate" th:value="${#temporals.format(form.contractEndDate, 'yyyy-MM-dd')}"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
              <div class="sm:col-span-3">
                <label for="commission" class="block text-sm/6 font-medium text-gray-900">Commission (%)</label>
                <div class="mt-2">
                  <input id="commission" type="number" th:field="*{commission}" min="0" step="0.01"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
            </div>
          </div>
          <!-- ROI info -->
          <div class="border-b border-gray-900/10 pb-6">
            <h2 class="text-base/7 font-semibold text-gray-900">3. ROI Information</h2>
            <div class="mt-6 grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-6">
              <div class="sm:col-span-3">
                <label for="roi-min" class="block text-sm/6 font-medium text-gray-900">Minimum (%)</label>
                <div class="mt-2">
                  <input id="roi-min" type="number" th:field="*{roiMin}" min="0" step="0.01"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
              <div class="sm:col-span-3">
                <label for="roi-max" class="block text-sm/6 font-medium text-gray-900">Maximum (%)</label>
                <div class="mt-2">
                  <input id="roi-max" type="number" th:field="*{roiMax}" min="0" step="0.01"
                         class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6">
                </div>
              </div>
            </div>
          </div>
          <div class="mt-6 flex items-center gap-x-6">
            <button type="submit" class="rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-blue-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600">Update</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
</html>
